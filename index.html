<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valemos Más Unidas</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#fff;
text-align:center;
}

header{
background:#ffe6f1;
padding:40px 20px;
}

.logo{
width:300px;
max-width:90%;
}

h1{
color:#e60073;
font-size:38px;
margin:15px 0;
}

h2{
color:#e60073;
}

p{
font-size:18px;
color:#444;
}

.boton{
display:inline-block;
margin-top:20px;
padding:15px 30px;
background:#e60073;
color:white;
text-decoration:none;
border-radius:10px;
font-size:18px;
}

.whatsapp{
background:#25D366;
}

section{
padding:50px 20px;
max-width:700px;
margin:auto;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

input, select{
padding:12px;
font-size:16px;
border-radius:8px;

}

button{
padding:15px;

<body>

<header>

<img src="logo.jpg" class="logo">

<h1>Valemos Más Unidas</h1>

<p>Hecho por mujeres... para mujeres.</p>

<p><strong>Tu asistente financiera: Valeria Capital</strong></p>

<a class="boton whatsapp" href="https://wa.me/5215624826605" target="_blank">Hablar con Valeria Capital</a>

</header>

<section>

<form>

<input type="text" placeholder="Nombre completo" required>

<input type="tel" placeholder="WhatsApp" required>

<select required>
<option value="">Monto que necesitas</option>
<option>$1,000</option>
<option>$2,000</option>
<option>$5,000</option>
<option>$10,000</option>
</select>

<input type="text" placeholder="Ciudad">

</form>

</section>

<footer>

Valemos Más Unidas © 2026

</footer>
